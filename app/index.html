<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cap-games</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Shell Header (always visible) ────────────────────── -->
  <header class="sh-header">
    <span class="sh-logo">🎮 cap-games</span>
    <nav class="sh-nav">
      <span id="sh-who" class="sh-user"></span>
      <code id="sh-room-id" hidden></code>
      <button id="sh-btn-copy" class="sh-small" hidden title="Copy room code">Copy</button>
      <span id="sh-toast" class="sh-toast" hidden></span>
      <span id="sh-user-display" class="sh-small"></span>
      <button id="sh-btn-leave" class="sh-small danger" hidden>Leave</button>
      <button id="sh-btn-logout" class="sh-small">Logout</button>
    </nav>
  </header>

  <!-- ── Login ─────────────────────────────────────────────── -->
  <main id="view-login" class="sh-view sh-center">
    <h1>cap-games</h1>
    <p>Choose your player</p>
    <div id="sh-user-list" class="sh-user-list"></div>
  </main>

  <!-- ── Lobby ─────────────────────────────────────────────── -->
  <main id="view-lobby" class="sh-view" hidden>
    <h2>Lobby</h2>

    <section>
      <h3>Games</h3>
      <ul id="sh-game-list" class="sh-list"></ul>
    </section>

    <section>
      <h3>Join a room</h3>
      <div class="sh-row">
        <input id="sh-join-input" placeholder="Room code" />
        <button id="sh-btn-join">Join</button>
      </div>
    </section>
  </main>

  <!-- ── Room — game owns everything inside #game-root ──────── -->
  <main id="view-room" class="sh-view" hidden>
    <div id="game-root"></div>
  </main>

  <script type="module" src="platform.js"></script>
</body>
</html>
